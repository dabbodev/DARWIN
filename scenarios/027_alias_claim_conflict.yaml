scenario_id: 027_alias_claim_conflict
name: Alias claim conflict
category: registry
description: direct alias conflict preserves the original alias owner
tags:
  - alias
  - conflict
  - registry
demonstrates:
  - alias conflict detection
  - original alias target preservation
  - canonical identity preservation
expected_result: second claim fails and the alias still targets the first device
use:
  - single_home_network
setup:
  devices:
    - device_id: dev_A9F3
      label: project_server
      registry_hub: hub_home_001
      traffic_hub: hub_home_001
    - device_id: dev_B2C8
      label: tablet
      registry_hub: hub_home_001
      traffic_hub: hub_home_001
steps:
  - action: claim_alias
    registry_hub: hub_home_001
    alias: global.family.david.shared_alias
    target_device: dev_A9F3
    requested_by_device: dev_A9F3
    visibility: scope_local
  - action: claim_alias
    registry_hub: hub_home_001
    alias: global.family.david.shared_alias
    target_device: dev_B2C8
    requested_by_device: dev_B2C8
    visibility: scope_local
assertions:
  - type: latest_step_status
    expected: conflict
  - type: latest_step_reason
    expected: alias_conflict
  - type: alias_resolves_to
    registry_hub: hub_home_001
    alias: global.family.david.shared_alias
    device: dev_A9F3
    identity_chain: global.family.home.project_server
  - type: alias_status
    registry_hub: hub_home_001
    alias: global.family.david.shared_alias
    expected: active
  - type: conflict_exists
    registry_hub: hub_home_001
    conflict_type: alias_conflict
  - type: canonical_identity_unchanged
    registry_hub: hub_home_001
    device: dev_A9F3
    expected_identity_chain: global.family.home.project_server
  - type: canonical_identity_unchanged
    registry_hub: hub_home_001
    device: dev_B2C8
    expected_identity_chain: global.family.home.tablet
