scenario_id: 005_relocation_timeout
name: Relocation timeout keeps lane held
setup:
  registry_hubs:
    - hub_id: registry_home
      scope_path: global.family.home
  traffic_hubs:
    - hub_id: hub_1
    - hub_id: hub_2
  links:
    - from: hub_1
      to: hub_2
  devices:
    - device_id: dev_A9F3
      label: source
      traffic_hub: hub_1
    - device_id: dev_B2C8
      label: target
      registry_hub: registry_home
      traffic_hub: hub_2
steps:
  - action: open_lane
    source: dev_A9F3
    target: dev_B2C8
    traffic_hub: hub_1
    lane_id: lane_001
  - action: send_lane_data
    traffic_hub: hub_1
    lane: lane_001
    payload:
      message: first
  - action: mark_in_transit
    device: dev_B2C8
    registry_hub: registry_home
  - action: pause_lanes_for_relocation
    traffic_hub: hub_1
    device: dev_B2C8
  - action: attempt_lane_send
    traffic_hub: hub_1
    lane: lane_001
    payload:
      message: blocked while paused
  - action: expire_relocation_hold
    traffic_hub: hub_1
    device: dev_B2C8
assertions:
  - type: latest_step_status
    expected: relocation_failed
  - type: relocation_failed
    traffic_hub: hub_1
    device: dev_B2C8
  - type: lane_state
    traffic_hub: hub_1
    lane: lane_001
    expected: paused_relocation
  - type: flow_control_exists
    traffic_hub: hub_1
    lane: lane_001
  - type: lane_sequence
    traffic_hub: hub_1
    lane: lane_001
    last_sent: 1
    last_acknowledged: 1
  - type: attachment_is
    registry_hub: registry_home
    device: dev_B2C8
    expected_attachment: registry_home
