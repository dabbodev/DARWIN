scenario_id: 023_hmac_move_contract_expired_session
name: HMAC move contract expired session
category: security
description: Expires a simulator-local move auth session before applying an HMAC move contract.
tags:
  - relocation
  - move-contract
  - hmac
  - session
  - expiration
  - simulator-only
demonstrates:
  - HMAC move contracts require an active local session.
  - Expired sessions fail without updating attachment state.
  - Failed move auth leaves counters unchanged.
expected_result: The move is rejected with move_session_inactive and the old attachment remains.
setup:
  registry_hubs:
    - hub_id: registry_home
      scope_path: global.family.home
    - hub_id: registry_office
      scope_path: global.family.office
  traffic_hubs:
    - hub_id: hub_home
    - hub_id: hub_office
  devices:
    - device_id: dev_A9F3
      label: phone
      registry_hub: registry_home
      traffic_hub: hub_home
steps:
  - action: create_local_session
    device: dev_A9F3
    registry_hub: registry_home
    session_id: session_move_023
    auth_secret: test_move_secret_simulator_only
    current_time: 0
    ttl: 1
  - action: expire_local_sessions
    registry_hub: registry_home
    current_time: 1
  - action: mark_in_transit
    device: dev_A9F3
    registry_hub: registry_home
  - action: move_device
    device: dev_A9F3
    old_registry_hub: registry_home
    new_registry_hub: registry_office
    old_traffic_hub: hub_home
    new_traffic_hub: hub_office
    auth_mode: hmac_sha256_experimental
    session_id: session_move_023
    auth_secret: test_move_secret_simulator_only
    move_nonce: nonce_move_023
    move_counter: 1
assertions:
  - type: latest_step_status
    expected: move_contract_rejected
  - type: latest_step_reason
    expected: move_session_inactive
  - type: attachment_is
    registry_hub: registry_home
    device: dev_A9F3
    expected_attachment: registry_home
  - type: move_not_recorded
    registry_hub: registry_home
    device: dev_A9F3
  - type: session_state
    registry_hub: registry_home
    session_id: session_move_023
    expected: expired
  - type: session_counter
    registry_hub: registry_home
    session_id: session_move_023
    expected: 0
