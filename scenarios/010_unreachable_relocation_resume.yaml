scenario_id: 010_unreachable_relocation_resume
name: Unreachable relocation resume keeps flow control
category: relocation
description: Attempts to resume relocation traffic when the moved target has no reachable route.
tags:
  - relocation
  - routing
  - flow-control
demonstrates:
  - Route availability checks during relocation resume.
  - Flow control retention after an unreachable move target.
expected_result: Resume reports route unavailable and keeps relocation flow control active.
setup:
  registry_hubs:
    - hub_id: registry_home
      scope_path: global.family.home
    - hub_id: registry_office
      scope_path: global.family.office
  traffic_hubs:
    - hub_id: hub_1
    - hub_id: hub_2
    - hub_id: hub_9
  links:
    - from: hub_1
      to: hub_2
  devices:
    - device_id: dev_A9F3
      label: source
      traffic_hub: hub_1
    - device_id: dev_B2C8
      label: target
      registry_hub: registry_home
      traffic_hub: hub_2
steps:
  - action: open_lane
    source: dev_A9F3
    target: dev_B2C8
    traffic_hub: hub_1
    lane_id: lane_001
  - action: send_lane_data
    traffic_hub: hub_1
    lane: lane_001
    payload:
      message: first
  - action: mark_in_transit
    device: dev_B2C8
    registry_hub: registry_home
  - action: pause_lanes_for_relocation
    traffic_hub: hub_1
    device: dev_B2C8
  - action: move_device
    device: dev_B2C8
    old_registry_hub: registry_home
    new_registry_hub: registry_office
    old_traffic_hub: hub_2
    new_traffic_hub: hub_9
  - action: resume_lanes_after_relocation
    traffic_hub: hub_1
    device: dev_B2C8
assertions:
  - type: latest_step_status
    expected: route_unavailable
  - type: lane_state
    traffic_hub: hub_1
    lane: lane_001
    expected: awaiting_verification
  - type: flow_control_exists
    traffic_hub: hub_1
    lane: lane_001
  - type: lane_sequence
    traffic_hub: hub_1
    lane: lane_001
    last_sent: 1
    last_acknowledged: 1
