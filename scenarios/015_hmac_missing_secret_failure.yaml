scenario_id: 015_hmac_missing_secret_failure
name: HMAC missing secret failure
category: security
description: Rejects an HMAC-mode lane packet when no simulator test secret is supplied.
tags:
  - hmac
  - packet-auth
  - missing-secret
  - simulator-only
demonstrates:
  - HMAC mode is explicit opt-in and requires per-step test configuration.
  - Missing HMAC configuration fails cleanly without delivering the packet.
expected_result: The HMAC packet is rejected and lane sequence counters do not advance.
setup:
  traffic_hubs:
    - hub_id: hub_home_001
  devices:
    - device_id: dev_A9F3
      label: source
      traffic_hub: hub_home_001
    - device_id: dev_B2C8
      label: target
      traffic_hub: hub_home_001
steps:
  - action: open_lane
    source: dev_A9F3
    target: dev_B2C8
    traffic_hub: hub_home_001
    lane_id: lane_001
  - action: send_lane_data
    traffic_hub: hub_home_001
    lane: lane_001
    payload:
      message: missing secret
    auth_mode: hmac_sha256_experimental
assertions:
  - type: latest_step_status
    expected: invalid_auth_tag
  - type: lane_sequence
    traffic_hub: hub_home_001
    lane: lane_001
    last_sent: 0
    last_acknowledged: 0
  - type: event_seen
    event_type: invalid_auth_tag
