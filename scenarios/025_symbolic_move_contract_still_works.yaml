scenario_id: 025_symbolic_move_contract_still_works
name: Symbolic move contract still works
category: relocation
description: Applies the default symbolic move contract path without HMAC session fields.
tags:
  - relocation
  - move-contract
  - symbolic
demonstrates:
  - Missing auth_mode remains symbolic.
  - Symbolic MoveContract.valid behavior still updates attachment state.
  - Existing relocation scenarios do not require HMAC material.
expected_result: The symbolic move updates attachment state and records the move without HMAC fields.
setup:
  registry_hubs:
    - hub_id: registry_home
      scope_path: global.family.home
    - hub_id: registry_office
      scope_path: global.family.office
  traffic_hubs:
    - hub_id: hub_home
    - hub_id: hub_office
  devices:
    - device_id: dev_A9F3
      label: phone
      registry_hub: registry_home
      traffic_hub: hub_home
steps:
  - action: mark_in_transit
    device: dev_A9F3
    registry_hub: registry_home
  - action: move_device
    device: dev_A9F3
    old_registry_hub: registry_home
    new_registry_hub: registry_office
    old_traffic_hub: hub_home
    new_traffic_hub: hub_office
assertions:
  - type: latest_step_status
    expected: attachment_updated
  - type: attachment_is
    registry_hub: registry_home
    device: dev_A9F3
    expected_attachment: registry_office
  - type: move_recorded
    registry_hub: registry_home
    device: dev_A9F3
  - type: device_state
    registry_hub: registry_home
    device: dev_A9F3
    expected: online
