scenario_id: 019_hmac_revoked_session_failure
name: HMAC revoked session failure
category: security
description: Revokes a simulator-local HMAC session and rejects later rolling proof verification.
tags:
  - hmac
  - session
  - revocation
  - simulator-only
demonstrates:
  - RegistryHub-owned local sessions can be explicitly revoked.
  - Revoked sessions cannot verify HMAC rolling proof material.
  - Revocation is deterministic simulator trust state, not production cryptography.
expected_result: Rolling proof verification is rejected after the local session is revoked.
setup:
  registry_hubs:
    - hub_id: hub_home_001
      scope_path: global.family.david.home
  devices:
    - device_id: dev_A9F3
      label: phone
steps:
  - action: register_device
    device: dev_A9F3
    registry_hub: hub_home_001
    label: phone
  - action: create_local_session
    device: dev_A9F3
    registry_hub: hub_home_001
    session_id: session_revoked_001
    auth_secret: test_secret_simulator_only
  - action: revoke_local_session
    registry_hub: hub_home_001
    session_id: session_revoked_001
    reason: scenario_revocation
  - action: verify_hmac_session_proof
    registry_hub: hub_home_001
    session_id: session_revoked_001
    counter: 1
    nonce: nonce_after_revocation
    requested_capability: send_normal_traffic
assertions:
  - type: latest_step_status
    expected: rolling_proof_rejected
  - type: session_state
    registry_hub: hub_home_001
    session_id: session_revoked_001
    expected: revoked
  - type: session_counter
    registry_hub: hub_home_001
    session_id: session_revoked_001
    expected: 0
  - type: event_seen
    event_type: rolling_proof_rejected
