scenario_id: 022_hmac_move_contract_tamper_failure
name: HMAC move contract tamper failure
category: security
description: Computes a valid move auth tag, tampers the destination attachment, and rejects the move.
tags:
  - relocation
  - move-contract
  - hmac
  - tamper
  - simulator-only
demonstrates:
  - Move auth tags bind the destination attachment.
  - Tampered move contracts fail without updating attachment state.
  - Failed move auth does not advance the session counter.
expected_result: The tampered move is rejected with invalid_move_auth_tag and no move is recorded.
setup:
  registry_hubs:
    - hub_id: registry_home
      scope_path: global.family.home
    - hub_id: registry_office
      scope_path: global.family.office
  traffic_hubs:
    - hub_id: hub_home
    - hub_id: hub_office
  devices:
    - device_id: dev_A9F3
      label: phone
      registry_hub: registry_home
      traffic_hub: hub_home
steps:
  - action: create_local_session
    device: dev_A9F3
    registry_hub: registry_home
    session_id: session_move_022
    auth_secret: test_move_secret_simulator_only
  - action: mark_in_transit
    device: dev_A9F3
    registry_hub: registry_home
  - action: move_device
    device: dev_A9F3
    old_registry_hub: registry_home
    new_registry_hub: registry_office
    old_traffic_hub: hub_home
    new_traffic_hub: hub_office
    auth_mode: hmac_sha256_experimental
    session_id: session_move_022
    auth_secret: test_move_secret_simulator_only
    move_nonce: nonce_move_022
    move_counter: 1
    tamper_new_attachment: true
assertions:
  - type: latest_step_status
    expected: move_contract_rejected
  - type: latest_step_reason
    expected: invalid_move_auth_tag
  - type: attachment_is
    registry_hub: registry_home
    device: dev_A9F3
    expected_attachment: registry_home
  - type: move_not_recorded
    registry_hub: registry_home
    device: dev_A9F3
  - type: session_counter
    registry_hub: registry_home
    session_id: session_move_022
    expected: 0
