scenario_id: 040_authority_audit_trace_fallback
name: Authority audit trace fallback
category: registry
description: retained authority audit trace assertions observe a simulator-local fallback grant
tags:
  - alias
  - alias_authority_chain
  - authority_audit
  - fallback
  - v0.7
demonstrates:
  - retained fallback audit trace assertions
  - deterministic fallback trace explanation
  - simulator-local pass-up policy
expected_result: global.server falls back to global.family.david.server at the family hub
setup:
  registry_hubs:
    - hub_id: registry_home_001
      scope_path: global.family.david.home
      parent_hub_id: registry_family_001
    - hub_id: registry_family_001
      scope_path: global.family.david
      parent_hub_id: registry_global_001
      alias_authority_policy:
        allow_pass_up: false
        allow_fallback: true
    - hub_id: registry_global_001
      scope_path: global
  devices:
    - device_id: dev_A9F3
      label: server
steps:
  - action: register_device
    registry_hub: registry_home_001
    device: dev_A9F3
    label: server
  - action: register_device
    registry_hub: registry_family_001
    device: dev_A9F3
    label: server
  - action: claim_alias_through_authority_chain
    registry_hub: registry_home_001
    requested_alias: global.server
    local_name: server
    target_device: dev_A9F3
    requested_by_device: dev_A9F3
    fallback_allowed: true
    visibility: scope_local
assertions:
  - type: latest_step_status
    expected: fallback_granted
  - type: authority_audit_trace_contains
    registry_hub: registry_family_001
    requested_alias: global.server
    granted_alias: global.family.david.server
    device_id: dev_A9F3
    final_status: fallback_granted
    outcome: fallback
    summary_contains: fell back to global.family.david.server
    expected_count: 1
  - type: alias_not_resolved
    registry_hub: registry_global_001
    alias: global.server
  - type: alias_resolves_to
    registry_hub: registry_family_001
    alias: global.family.david.server
    device: dev_A9F3
    identity_chain: global.family.david.server
