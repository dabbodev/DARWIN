scenario_id: 060_stream_offer_lifecycle_apply_without_transition
name: Stream offer lifecycle apply without transition
category: stream_offer
description: explicit caller-provided lifecycle plan can expire offers without recording transitions
tags:
  - stream_offer
  - lifecycle
  - expiration
  - explicit_apply
  - v1.3
demonstrates:
  - apply can use an explicit caller-provided lifecycle plan
  - terminal and stale planned offers are skipped deterministically
  - missing planned offers are reported deterministically
  - transition recording can be disabled
expected_result: eligible planned offer expires, skipped and missing IDs are reported, and transition history remains empty
setup:
  registry_hubs:
    - hub_id: registry_chat_001
      scope_path: global.chat
steps:
  - action: hold_stream_offer
    registry_hub: registry_chat_001
    offer_id: offer_lifecycle_no_transition
    requester_id: dev_TRINITY
    target_handle: alias:neo
    lane_signature: basic_messaging:v1
    rendezvous_scope: global.chat
    created_order: 0
    expires_order: 2
  - action: hold_stream_offer
    registry_hub: registry_chat_001
    offer_id: offer_lifecycle_terminal
    requester_id: dev_TRINITY
    target_handle: alias:neo
    lane_signature: basic_messaging:v1
    rendezvous_scope: global.chat
    status: accepted
    created_order: 0
    expires_order: 1
  - action: hold_stream_offer
    registry_hub: registry_chat_001
    offer_id: offer_lifecycle_stale
    requester_id: dev_TRINITY
    target_handle: alias:neo
    lane_signature: basic_messaging:v1
    rendezvous_scope: global.chat
    created_order: 0
    expires_order: 9
  - action: apply_stream_offer_lifecycle_plan
    registry_hub: registry_chat_001
    plan_checked_at: 5
    expired_offer_ids:
      - offer_lifecycle_no_transition
      - offer_lifecycle_terminal
      - offer_lifecycle_stale
      - offer_lifecycle_missing
    record_transition: false
assertions:
  - type: stream_offer_lifecycle_apply_result_contains
    registry_hub: registry_chat_001
    plan_checked_at: 5
    applied_offer_id: offer_lifecycle_no_transition
    skipped_offer_ids:
      - offer_lifecycle_terminal
      - offer_lifecycle_stale
    missing_offer_id: offer_lifecycle_missing
    recorded_transition_count: 0
    expected_count: 1
  - type: held_stream_offer_contains
    registry_hub: registry_chat_001
    offer_id: offer_lifecycle_no_transition
    status: expired
    expected_count: 1
  - type: held_stream_offer_contains
    registry_hub: registry_chat_001
    offer_id: offer_lifecycle_terminal
    status: accepted
    expected_count: 1
  - type: held_stream_offer_contains
    registry_hub: registry_chat_001
    offer_id: offer_lifecycle_stale
    status: held
    expected_count: 1
  - type: stream_offer_status_transition_contains
    registry_hub: registry_chat_001
    expected_count: 0
  - type: message_delivery_result_contains
    registry_hub: registry_chat_001
    expected_count: 0
