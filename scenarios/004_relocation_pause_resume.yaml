scenario_id: 004_relocation_pause_resume
name: Relocation pause and resume
category: relocation
description: Pauses a lane during relocation, moves the target device, and resumes traffic on the new route.
tags:
  - relocation
  - lane
  - flow-control
demonstrates:
  - In-transit state before device movement.
  - Lane pause and resume behavior during relocation.
  - Route update after the target traffic hub changes.
expected_result: The lane returns to active state on the new route with sequence counters preserved.
setup:
  registry_hubs:
    - hub_id: registry_home
      scope_path: global.family.home
    - hub_id: registry_office
      scope_path: global.family.office
  traffic_hubs:
    - hub_id: hub_1
    - hub_id: hub_2
    - hub_id: hub_3
    - hub_id: hub_4
  links:
    - from: hub_1
      to: hub_2
    - from: hub_2
      to: hub_3
    - from: hub_2
      to: hub_4
  devices:
    - device_id: dev_A9F3
      label: source
      traffic_hub: hub_1
    - device_id: dev_B2C8
      label: target
      registry_hub: registry_home
      traffic_hub: hub_3
steps:
  - action: open_lane
    source: dev_A9F3
    target: dev_B2C8
    traffic_hub: hub_1
    lane_id: lane_001
  - action: send_lane_data
    traffic_hub: hub_1
    lane: lane_001
    payload:
      message: first
  - action: mark_in_transit
    device: dev_B2C8
    registry_hub: registry_home
  - action: pause_lanes_for_relocation
    traffic_hub: hub_1
    device: dev_B2C8
  - action: move_device
    device: dev_B2C8
    old_registry_hub: registry_home
    new_registry_hub: registry_office
    old_traffic_hub: hub_3
    new_traffic_hub: hub_4
  - action: resume_lanes_after_relocation
    traffic_hub: hub_1
    device: dev_B2C8
assertions:
  - type: lane_state
    traffic_hub: hub_1
    lane: lane_001
    expected: active
  - type: lane_sequence
    traffic_hub: hub_1
    lane: lane_001
    last_sent: 1
    last_acknowledged: 1
