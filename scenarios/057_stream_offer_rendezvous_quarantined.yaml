scenario_id: 057_stream_offer_rendezvous_quarantined
name: Stream offer rendezvous quarantined
category: stream_offer
description: lane admission can represent a symbolic quarantined outcome
tags:
  - stream_offer
  - lane_admission
  - quarantined
  - v1.2
demonstrates:
  - lane admission policy default status can be quarantined
  - quarantined outcome is symbolic metadata only
  - no delivery behavior changes
expected_result: policy returns quarantined with allowed false
setup:
  registry_hubs:
    - hub_id: registry_chat_001
      scope_path: global.chat
steps:
  - action: hold_stream_offer
    registry_hub: registry_chat_001
    offer_id: offer_chat_quarantined
    requester_id: dev_TRINITY
    target_handle: alias:neo
    lane_signature: basic_messaging:v1
    rendezvous_scope: global.chat
  - action: evaluate_lane_admission_policy
    registry_hub: registry_chat_001
    policy_id: policy_chat_admission_quarantined
    hub_id: registry_chat_001
    offer_id: offer_chat_quarantined
    default_status: quarantined
assertions:
  - type: held_stream_offer_contains
    registry_hub: registry_chat_001
    offer_id: offer_chat_quarantined
    expected_count: 1
  - type: lane_admission_decision_contains
    registry_hub: registry_chat_001
    policy_id: policy_chat_admission_quarantined
    offer_id: offer_chat_quarantined
    target_scope: global.chat
    status: quarantined
    reason: quarantined
    allowed: false
    expected_count: 1
  - type: message_delivery_result_contains
    registry_hub: registry_chat_001
    expected_count: 0
