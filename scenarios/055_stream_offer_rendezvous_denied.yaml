scenario_id: 055_stream_offer_rendezvous_denied
name: Stream offer rendezvous denied
category: stream_offer
description: explicit lane admission deny blocks a held stream offer
tags:
  - stream_offer
  - rendezvous
  - lane_admission
  - denied
  - v1.2
demonstrates:
  - private poll can find an offer before policy denial
  - explicit denied lane signatures produce deterministic denial
  - denial is symbolic and does not deliver
expected_result: explicit lane deny returns a deny decision
setup:
  registry_hubs:
    - hub_id: registry_chat_001
      scope_path: global.chat
steps:
  - action: hold_stream_offer
    registry_hub: registry_chat_001
    offer_id: offer_chat_denied
    requester_id: dev_TRINITY
    target_handle: alias:neo
    lane_signature: basic_messaging:v1
    visibility_tier: 1
    rendezvous_scope: global.chat
  - action: poll_held_stream_offers
    registry_hub: registry_chat_001
    request_id: poll_req_chat_denied
    offer_id: offer_chat_denied
    polling_hub_id: hub_private_child
    requester_id: hub_private_child
    target_scope: global.chat
    visibility_tier: 1
  - action: evaluate_lane_admission_policy
    registry_hub: registry_chat_001
    policy_id: policy_chat_admission_denied
    hub_id: registry_chat_001
    offer_id: offer_chat_denied
    poll_request_id: poll_req_chat_denied
    poll_result_request_id: poll_req_chat_denied
    denied_lane_signatures:
      - basic_messaging:v1
    default_status: pass_down
assertions:
  - type: rendezvous_poll_result_contains
    registry_hub: registry_chat_001
    request_id: poll_req_chat_denied
    status: matched
    matched_offer_id: offer_chat_denied
    expected_count: 1
  - type: lane_admission_decision_contains
    registry_hub: registry_chat_001
    policy_id: policy_chat_admission_denied
    offer_id: offer_chat_denied
    status: deny
    reason: explicit_lane_denied
    allowed: false
    expected_count: 1
  - type: message_delivery_result_contains
    registry_hub: registry_chat_001
    expected_count: 0
