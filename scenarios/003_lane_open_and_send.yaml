scenario_id: 003_lane_open_and_send
name: Lane open and send
setup:
  traffic_hubs:
    - hub_id: hub_1
    - hub_id: hub_2
    - hub_id: hub_3
  links:
    - from: hub_1
      to: hub_2
    - from: hub_2
      to: hub_3
  devices:
    - device_id: dev_A9F3
      label: source
      traffic_hub: hub_1
    - device_id: dev_B2C8
      label: target
      traffic_hub: hub_3
steps:
  - action: open_lane
    source: dev_A9F3
    target: dev_B2C8
    traffic_hub: hub_1
    lane_id: lane_001
  - action: send_lane_data
    traffic_hub: hub_1
    lane: lane_001
    payload:
      message: first
assertions:
  - type: lane_state
    traffic_hub: hub_1
    lane: lane_001
    expected: active
  - type: lane_sequence
    traffic_hub: hub_1
    lane: lane_001
    last_sent: 1
    last_acknowledged: 1
