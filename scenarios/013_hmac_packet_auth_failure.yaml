scenario_id: 013_hmac_packet_auth_failure
name: HMAC packet auth failure
category: security
description: Rejects a lane packet with a tampered test-only HMAC tag.
tags:
  - hmac
  - packet-auth
  - simulator-only
demonstrates:
  - Experimental HMAC-SHA256 packet verification.
  - Invalid HMAC tags reuse the existing invalid auth failure path.
expected_result: The packet is rejected and lane sequence counters do not advance.
setup:
  traffic_hubs:
    - hub_id: hub_home_001
  devices:
    - device_id: dev_A9F3
      label: source
      traffic_hub: hub_home_001
    - device_id: dev_B2C8
      label: target
      traffic_hub: hub_home_001
steps:
  - action: open_lane
    source: dev_A9F3
    target: dev_B2C8
    traffic_hub: hub_home_001
    lane_id: lane_001
  - action: send_lane_data
    traffic_hub: hub_home_001
    lane: lane_001
    payload:
      message: tampered
    auth_mode: hmac_sha256_experimental
    auth_secret: test_secret_simulator_only
    tamper_auth_tag: true
assertions:
  - type: latest_step_status
    expected: invalid_auth_tag
  - type: lane_sequence
    traffic_hub: hub_home_001
    lane: lane_001
    last_sent: 0
    last_acknowledged: 0
  - type: event_seen
    event_type: invalid_auth_tag
