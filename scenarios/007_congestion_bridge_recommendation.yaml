scenario_id: 007_congestion_bridge_recommendation
name: Congestion bridge recommendation
category: metrics
description: Records sustained cross-tree traffic and proposes a traffic bridge recommendation.
tags:
  - metrics
  - recommendation
  - cross-tree-traffic
demonstrates:
  - Traffic metric accumulation.
  - Growth recommendation generation.
expected_result: A create-traffic-bridge recommendation is proposed for the congested branch pair.
setup:
  traffic_hubs:
    - hub_id: traffic_home_001
steps:
  - action: record_cross_tree_packet
    traffic_hub: traffic_home_001
    from_branch: global.family.home
    to_branch: global.family.office
    count: 11
  - action: recommend_traffic_bridge
    traffic_hub: traffic_home_001
assertions:
  - type: recommendation_exists
    traffic_hub: traffic_home_001
    recommendation_type: create_traffic_bridge
