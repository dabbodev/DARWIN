scenario_id: 050_symbolic_encrypted_delivery_policy_check
name: Symbolic encrypted delivery policy check
category: encryption
description: policy-check-only encrypted delivery request evaluates policy without delivery
tags:
  - encryption
  - symbolic
  - encrypted_delivery
  - policy_check_only
  - v1.1
demonstrates:
  - wrapped encrypted delivery policy-check-only result
  - retained symbolic encryption policy decision
  - no mailbox delivery attempt
expected_result: symbolic policy check is accepted and no inbox entry is created
setup:
  registry_hubs:
    - hub_id: registry_chat_001
      scope_path: global.chat
  devices:
    - device_id: dev_NEO
      label: neo
steps:
  - action: register_lane_definition
    registry_hub: registry_chat_001
    lane_signature: basic_messaging:v1
  - action: register_mailbox
    registry_hub: registry_chat_001
    mailbox_id: mailbox_neo
    canonical_device_id: dev_NEO
    local_name: neo
    scope: global.chat
  - action: bind_mailbox_capability
    registry_hub: registry_chat_001
    mailbox_id: mailbox_neo
    lane_signature: basic_messaging:v1
  - action: register_adapter_endpoint
    registry_hub: registry_chat_001
    endpoint_id: endpoint_mailbox_neo
    subject_id: mailbox_neo
    subject_kind: mailbox
    adapter_kind: in_memory
    status: available
    lane_signatures:
      - basic_messaging:v1
    scope: global.chat
  - action: register_encryption_identity
    registry_hub: registry_chat_001
    encryption_identity_id: enc_mailbox_neo
    subject_id: mailbox_neo
    subject_kind: mailbox
  - action: register_key_bundle_reference
    registry_hub: registry_chat_001
    key_bundle_id: kb_mailbox_neo_001
    encryption_identity_id: enc_mailbox_neo
    public_ref: symbolic://public/mailbox_neo/001
  - action: register_mailbox_encryption_binding
    registry_hub: registry_chat_001
    mailbox_id: mailbox_neo
    encryption_identity_id: enc_mailbox_neo
    key_bundle_id: kb_mailbox_neo_001
    required_for_lanes:
      - basic_messaging:v1
  - action: register_mailbox_encryption_policy
    registry_hub: registry_chat_001
    policy_id: policy_mailbox_neo
    mailbox_id: mailbox_neo
  - action: evaluate_encrypted_delivery_request
    registry_hub: registry_chat_001
    request_id: req_policy_check_only
    message_id: msg_policy_check_only
    sender_id: dev_TRINITY
    recipient_address: darwin://global.chat.neo/inbox
    mailbox_id: mailbox_neo
    policy_id: policy_mailbox_neo
    mode: policy_check_only
    envelope_id: env_policy_check_only
    encryption_identity_id: enc_mailbox_neo
    key_bundle_id: kb_mailbox_neo_001
    profile: symbolic_e2ee_v1
    state: symbolically_encrypted
    status: ready
assertions:
  - type: encrypted_delivery_result_contains
    registry_hub: registry_chat_001
    request_id: req_policy_check_only
    message_id: msg_policy_check_only
    mailbox_id: mailbox_neo
    lane_signature: basic_messaging:v1
    status: policy_check_only
    reason: accepted
    delivery_attempted: false
    delivery_allowed: true
    policy_required: true
    gate_status: allowed
    gate_reason: accepted
    expected_count: 1
  - type: encrypted_delivery_audit_contains
    registry_hub: registry_chat_001
    request_id: req_policy_check_only
    message_id: msg_policy_check_only
    mailbox_id: mailbox_neo
    gate_status: allowed
    gate_reason: accepted
    delivery_status: not_attempted
    delivery_reason: accepted
    policy_id: policy_mailbox_neo
    encryption_required: true
    envelope_accepted: true
    expected_count: 1
  - type: encryption_policy_decision_contains
    registry_hub: registry_chat_001
    policy_id: policy_mailbox_neo
    mailbox_id: mailbox_neo
    message_id: msg_policy_check_only
    status: accepted
    encryption_required: true
    envelope_accepted: true
    expected_count: 1
  - type: message_delivery_result_contains
    registry_hub: registry_chat_001
    expected_count: 0
  - type: mailbox_inbox_contains
    registry_hub: registry_chat_001
    mailbox_id: mailbox_neo
    expected_count: 0
